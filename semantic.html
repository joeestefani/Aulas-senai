<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>html semantico</title>
</head>
<body>
    <header>header</header>
<!-- header: representa o cabeçalho de um documento ou seção, geralmente contendo o título, logotipo e elementos de navegação. -->
    <nav>navbar</nav>
    <!-- nav: representa uma seção de navegação, contendo links para outras páginas ou seções do site. -->
    <aside>Aside</aside>
    <!-- aside: representa um conteúdo relacionado, mas separado do conteúdo principal, como uma barra lateral ou um bloco de informações adicionais. -->
    <main>Main
     <!-- main: representa o conteúdo principal de um documento, onde o conteúdo mais importante é colocado. Deve haver apenas um elemento main por página. -->
        <article>Articcle
            <!-- article: representa um conteúdo independente e auto-contido, como um artigo de blog, uma notícia ou um post em redes sociais. Pode ser reutilizado em diferentes contextos. -->
            <figure>
                <!-- figure: representa um conteúdo gráfico, como uma imagem, um diagrama ou um gráfico, juntamente com uma legenda (figcaption) que descreve o conteúdo gráfico. -->
                figure
            </figure>
            <p>p</p>
            <!-- paragrafo pelo amor de Deus né -->
        </article>
        <section>section</section>
        <!-- section: representa uma seção genérica de um documento, que pode conter um título e outros elementos relacionados. É usada para agrupar conteúdo relacionado,
     mas não necessariamente independente como um artigo. -->
    </main>
    <footer>footer</footer>
        <!-- footer: representa o rodapé de um documento ou seção, geralmente contendo informações de copyright, links para políticas de privacidade e outros detalhes 
        relacionados ao site. -->
</body>
</html>
